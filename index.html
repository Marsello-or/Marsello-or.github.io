<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Percobaan Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

    <style>
        h1 {
            font-size: 50px;
            font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
            background: black;
            margin: 0px;
            padding: 10px 20px 10px 10px;
            text-align: left;
        }

        body {
            background: rgb(58, 58, 58);
            color: white;
            font-size: 25px;
            margin: 0px;
            padding: 0px;
        }

        section {
            background: grey;
            font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
        }

        footer {
            background: maroon;
        }

        .badan {
            padding-left: 10px;
            height: 1000px;
        }

        .navbar-brand {
            font-size: 40px;
        }

        .navbar {
        background-color: #2c2c2c;
      }

      .navbar-nav a {
        color: #fff;
        text-decoration: none;
        display: inline-block;
        padding: 10px 15px;
        position: relative;
      }
      .navbar-nav a:after {
        background: none repeat scroll 0 0 transparent;
        bottom: 0;
        content: '';
        display: block;
        height: 2px;
        left: 50%;
        position: absolute;
        background-color: #fff;
        transition: all 0.3s ease 0s, left 0.3s ease 0s;
        width: 0;
      }
      .navbar-nav a:hover,
      .navbar-nav a.active {
        color: maroon!important;
      }
      .navbar-nav a:hover:after,
      .navbar-nav a:active:after,
      .navbar-nav a.active:after {
        background-color: maroon;
        width: 100%;
        left: 0;
      }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Warfigs</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Homepage <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Daftar Figur</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#"> About Us</a>
                </li>
                <li clas="nav-item">
                    <a class="nav-link" href="#"> Kontak </a>
                </li>
            </ul>
            <form class="form-inline my-2 my-lg-0">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>




    <section class="badan"> Marsello Ormanda hehe </section>

    <footer> Footer </footer>

</body>

</html>
