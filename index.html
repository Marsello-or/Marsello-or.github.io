        .navbar {

        }

        .navbar-nav a {
            color: #fff;
            text-decoration: none;
            display: inline-block;
            padding: 10px 15px;
            position: relative;
        }

        .navbar-nav a:after {
            background: none repeat scroll 0 0 transparent;
            bottom: 0;
            content: '';
            display: block;
            height: 2px;
            left: 50%;
            position: absolute;
            background-color: #fff;
            transition: all 0.3s ease 0s, left 0.3s ease 0s;
            width: 0;
        }

        .navbar-nav a:hover,
        .navbar-nav a.active {
            color: maroon !important;
        }

        .navbar-nav a:hover:after,
        .navbar-nav a:active:after,
        .navbar-nav a.active:after {
            background-color: maroon;
            width: 100%;
            left: 0;
        }

        .warfigs1 {

            padding-top: 0px;

            color: white;
            font-style:bold;
        }

        .dibawah-warfigs1 {

        }
    </style>
